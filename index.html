<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marginalia</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="topbar-group">
          <button id="btn-new" class="tb-btn" title="New file (Ctrl+N)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path d="M9 1H4a1.5 1.5 0 0 0-1.5 1.5v11A1.5 1.5 0 0 0 4 15h8a1.5 1.5 0 0 0 1.5-1.5V5.5L9 1Z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M9 1v4.5h4.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button id="btn-open" class="tb-btn" title="Open… (Ctrl+O)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path d="M1.5 4A1.5 1.5 0 0 1 3 2.5h3l1.5 2H13A1.5 1.5 0 0 1 14.5 6v6A1.5 1.5 0 0 1 13 13.5H3A1.5 1.5 0 0 1 1.5 12V4Z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <div class="tb-dropdown">
            <button id="btn-recent" class="tb-btn" title="Recent files">
              <svg viewBox="0 0 16 16" width="15" height="15"><circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 4.5V8l2.5 1.8" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
            <div id="recent-menu" class="menu" hidden></div>
          </div>
          <span class="tb-sep"></span>
          <button id="btn-save" class="tb-btn" title="Save (Ctrl+S)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path d="M2.5 3A1.5 1.5 0 0 1 4 1.5h7L14.5 5v8A1.5 1.5 0 0 1 13 14.5H4A1.5 1.5 0 0 1 2.5 13V3Z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 1.5V5h5V1.5M5 14.5V10h6v4.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
        </div>
        <div id="file-title" class="file-title">
          <span id="file-name">Untitled</span><span id="dirty-dot" class="dirty-dot" hidden>&#9679;</span>
        </div>
        <div class="topbar-group">
          <button id="btn-source" class="tb-btn" title="Toggle source view (Ctrl+/)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path d="m5.5 4.5-4 3.5 4 3.5M10.5 4.5l4 3.5-4 3.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="btn-theme" class="tb-btn" title="Toggle light/dark theme">
            <svg viewBox="0 0 16 16" width="15" height="15"><path d="M13.5 9.5A5.8 5.8 0 0 1 6.5 2.5a5.8 5.8 0 1 0 7 7Z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </header>
      <div id="notice-bar" class="notice-bar" hidden>
        <span id="notice-text"></span>
        <button id="notice-action" class="notice-btn" hidden></button>
        <button id="notice-close" class="notice-btn">Dismiss</button>
      </div>
      <main id="editor-host">
        <div id="editor-root"></div>
        <div id="welcome" class="welcome" hidden>
          <div class="welcome-inner">
            <div class="welcome-logo">M</div>
            <h1>Marginalia</h1>
            <p>Open a Markdown file or start typing. Drop a file anywhere in this window.</p>
            <div class="welcome-actions">
              <button id="welcome-open" class="primary-btn">Open a file</button>
              <button id="welcome-new" class="ghost-btn">New document</button>
            </div>
            <div id="welcome-recent"></div>
          </div>
        </div>
      </main>
      <footer id="statusbar">
        <span id="status-type"></span>
        <span class="status-spacer"></span>
        <span id="status-words"></span>
      </footer>
    </div>
    <div id="modal-backdrop" class="modal-backdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <p id="modal-message"></p>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>
  </body>
</html>
